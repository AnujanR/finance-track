# Nginx reverse proxy for anujanfinance.anujanr.work
#
# Setup on VPS (161.35.37.88):
#
# 1. DNS (at your domain registrar / Cloudflare):
#    Type: A
#    Name: anujanfinance
#    Value: 161.35.37.88
#    TTL: Auto
#
# 2. Install nginx + certbot (once):
#    sudo apt update
#    sudo apt install -y nginx certbot python3-certbot-nginx
#
# 3. Copy this file:
#    sudo cp deploy/nginx/anujanfinance.conf /etc/nginx/sites-available/anujanfinance
#    sudo ln -sf /etc/nginx/sites-available/anujanfinance /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
# 4. SSL certificate:
#    sudo certbot --nginx -d anujanfinance.anujanr.work
#
# 5. DigitalOcean firewall: allow inbound TCP 80 and 443
#
# 6. FinTrack docker-compose should bind to localhost only:
#    ports:
#      - "127.0.0.1:3002:80"

server {
    listen 80;
    listen [::]:80;
    server_name anujanfinance.anujanr.work;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
